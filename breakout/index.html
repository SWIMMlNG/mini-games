<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧱 打砖块 - Breakout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 10px;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            color: #888;
            font-size: 0.75em;
        }

        .info-value {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.1em;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            background: #0a0a0a;
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #1a1a2e;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .btn-back {
            background: linear-gradient(45deg, #666, #999);
            color: #fff;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .speed-control label {
            font-size: 0.9em;
            color: #aaa;
        }

        .speed-control input[type="range"] {
            width: 100px;
        }

        .speed-value {
            color: #00ff88;
            font-weight: bold;
            min-width: 40px;
        }

        .mobile-controls {
            display: none;
            margin-top: 15px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: 70px;
            gap: 8px;
            justify-content: center;
        }

        .d-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 15px;
            background: rgba(0, 255, 136, 0.3);
            color: #fff;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .d-btn:hover, .d-btn:active {
            background: rgba(0, 255, 136, 0.6);
            transform: scale(0.95);
        }

        .d-btn.left { grid-column: 1; }
        .d-btn.center { grid-column: 2; background: rgba(0, 204, 255, 0.4); font-size: 1.2em; }
        .d-btn.right { grid-column: 3; }

        .instructions {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.85em;
            color: #aaa;
        }

        .instructions h3 {
            color: #00ff88;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .overlay.active {
            display: flex;
        }

        .overlay h2 {
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .overlay.win h2 {
            color: #00ff88;
        }

        .overlay.lose h2 {
            color: #ff4444;
        }

        .overlay .final-score {
            font-size: 1.3em;
            margin-bottom: 25px;
            color: #00ccff;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.6em; }
            .game-info { gap: 10px; }
            .info-item { padding: 6px 12px; }
            .mobile-controls { display: block; }
            .instructions { display: none; }
            #gameCanvas { max-width: 100%; }
        }

        @media (max-width: 480px) {
            .d-pad {
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: 60px;
            }
            .d-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧱 打砖块</h1>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">生命</div>
                <div class="info-value" id="lives">3</div>
            </div>
            <div class="info-item">
                <div class="info-label">关卡</div>
                <div class="info-value" id="level">1</div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="500"></canvas>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startGame()">开始游戏</button>
            <div class="speed-control">
                <label>球速:</label>
                <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
                <span class="speed-value" id="speedValue">1.0x</span>
            </div>
            <a href="../index.html" class="btn btn-back">← 返回</a>
        </div>

        <div class="mobile-controls">
            <div class="d-pad">
                <button class="d-btn left" ontouchstart="movePaddle('left')" onmousedown="movePaddle('left')">◀</button>
                <button class="d-btn center" ontouchstart="launchBall()" onmousedown="launchBall()">🚀</button>
                <button class="d-btn right" ontouchstart="movePaddle('right')" onmousedown="movePaddle('right')">▶</button>
            </div>
        </div>

        <div class="instructions">
            <h3>🎮 操作说明</h3>
            <p>使用 <span class="key">鼠标</span>、<span class="key">触摸</span> 或 <span class="key">方向键</span> 移动挡板</p>
            <p>反弹小球击碎所有砖块！点击发射小球</p>
        </div>
    </div>

    <div class="overlay win" id="winOverlay">
        <h2>🎉 恭喜通关!</h2>
        <div class="final-score">最终得分: <span id="winScore">0</span></div>
        <button class="btn btn-start" onclick="startGame()">再玩一次</button>
        <a href="../index.html" class="btn btn-back" style="margin-top: 15px;">← 返回大厅</a>
    </div>

    <div class="overlay lose" id="loseOverlay">
        <h2>💔 游戏结束</h2>
        <div class="final-score">最终得分: <span id="loseScore">0</span></div>
        <button class="btn btn-start" onclick="startGame()">重新开始</button>
        <a href="../index.html" class="btn btn-back" style="margin-top: 15px;">← 返回大厅</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const GAME_WIDTH = 600;
        const GAME_HEIGHT = 500;

        // 响应式画布尺寸
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 600);
            const scale = maxWidth / GAME_WIDTH;
            canvas.style.width = maxWidth + 'px';
            canvas.style.height = (GAME_HEIGHT * scale) + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        let animationId = null;
        let ballSpeedMultiplier = 1;
        let ballLaunched = false;

        // 游戏对象
        let paddle, ball, bricks, particles;

        // 砖块配置
        const BRICK_ROWS = 5;
        const BRICK_COLS = 8;
        const BRICK_WIDTH = 60;
        const BRICK_HEIGHT = 20;
        const BRICK_PADDING = 10;
        const BRICK_OFFSET_TOP = 60;
        const BRICK_OFFSET_LEFT = 35;

        // 颜色配置
        const BRICK_COLORS = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];

        // 粒子效果
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.radius = Math.random() * 3 + 2;
                this.color = color;
                this.life = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.life -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 初始化游戏
        function initGame() {
            // 挡板
            paddle = {
                x: GAME_WIDTH / 2 - 60,
                y: GAME_HEIGHT - 30,
                width: 120,
                height: 15,
                speed: 10
            };

            // 小球
            resetBall();

            // 砖块
            createBricks();

            // 粒子
            particles = [];

            // 重置状态
            score = 0;
            lives = 3;
            level = 1;
            ballLaunched = false;
            updateUI();

            // 隐藏覆盖层
            document.getElementById('winOverlay').classList.remove('active');
            document.getElementById('loseOverlay').classList.remove('active');
        }

        // 重置小球
        function resetBall() {
            ball = {
                x: GAME_WIDTH / 2,
                y: GAME_HEIGHT - 50,
                radius: 10,
                speed: 5,
                dx: 0,
                dy: 0
            };
            ballLaunched = false;
        }

        // 发射小球
        function launchBall() {
            if (!gameRunning || ballLaunched) return;
            ballLaunched = true;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1) * ballSpeedMultiplier;
            ball.dy = -4 * ballSpeedMultiplier;
        }

        // 创建砖块
        function createBricks() {
            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: BRICK_OFFSET_LEFT + c * (BRICK_WIDTH + BRICK_PADDING),
                        y: BRICK_OFFSET_TOP + r * (BRICK_HEIGHT + BRICK_PADDING),
                        width: BRICK_WIDTH,
                        height: BRICK_HEIGHT,
                        color: BRICK_COLORS[r],
                        visible: true
                    });
                }
            }
        }

        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            gameLoop();
            
            document.getElementById('startBtn').style.display = 'none';
        }

        // 游戏循环
        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();

            animationId = requestAnimationFrame(gameLoop);
        }

        // 更新游戏状态
        function update() {
            // 如果球还没发射，跟随挡板
            if (!ballLaunched) {
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius - 2;
                return;
            }

            // 更新小球位置
            ball.x += ball.dx;
            ball.y += ball.dy;

            // 墙壁碰撞
            if (ball.x + ball.radius > GAME_WIDTH || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // 底部掉落
            if (ball.y + ball.radius > GAME_HEIGHT) {
                lives--;
                updateUI();
                if (lives <= 0) {
                    gameOver(false);
                } else {
                    resetBall();
                }
            }

            // 挡板碰撞
            if (ball.y + ball.radius > paddle.y &&
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                
                // 根据击中位置改变角度
                let hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = 8 * (hitPos - 0.5);
                ball.dy = -Math.abs(ball.dy);
            }

            // 砖块碰撞
            for (let i = bricks.length - 1; i >= 0; i--) {
                const brick = bricks[i];
                if (brick.visible &&
                    ball.x > brick.x &&
                    ball.x < brick.x + brick.width &&
                    ball.y > brick.y &&
                    ball.y < brick.y + brick.height) {
                    
                    brick.visible = false;
                    ball.dy = -ball.dy;
                    score += 10;
                    updateUI();

                    // 创建粒子效果
                    for (let i = 0; i < 8; i++) {
                        particles.push(new Particle(
                            brick.x + brick.width / 2,
                            brick.y + brick.height / 2,
                            brick.color
                        ));
                    }

                    // 检查胜利
                    if (bricks.every(b => !b.visible)) {
                        gameOver(true);
                    }
                    break;
                }
            }

            // 更新粒子
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // 绘制网格背景
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i < GAME_WIDTH; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, GAME_HEIGHT);
                ctx.stroke();
            }
            for (let i = 0; i < GAME_HEIGHT; i += 20) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(GAME_WIDTH, i);
                ctx.stroke();
            }

            // 绘制砖块
            bricks.forEach(brick => {
                if (brick.visible) {
                    // 发光效果
                    ctx.shadowColor = brick.color;
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = brick.color;
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    ctx.shadowBlur = 0;

                    // 高光
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(brick.x, brick.y, brick.width, 5);
                }
            });

            // 绘制挡板
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 15;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;

            // 绘制小球
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;

            // 如果没发射，显示提示
            if (!ballLaunched && gameRunning) {
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('点击发射小球', GAME_WIDTH / 2, GAME_HEIGHT / 2);
            }

            // 绘制粒子
            particles.forEach(p => p.draw());
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        // 游戏结束
        function gameOver(win) {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (win) {
                document.getElementById('winScore').textContent = score;
                document.getElementById('winOverlay').classList.add('active');
            } else {
                document.getElementById('loseScore').textContent = score;
                document.getElementById('loseOverlay').classList.add('active');
            }

            document.getElementById('startBtn').style.display = 'inline-block';
        }

        // 移动挡板（虚拟按键）
        function movePaddle(direction) {
            if (!gameRunning) return;
            const moveDistance = paddle.speed * 2;
            if (direction === 'left') {
                paddle.x = Math.max(0, paddle.x - moveDistance);
            } else if (direction === 'right') {
                paddle.x = Math.min(GAME_WIDTH - paddle.width, paddle.x + moveDistance);
            }
        }

        // 获取鼠标/触摸在画布上的正确坐标
        function getCanvasCoordinates(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            return {
                x: (clientX - rect.left) * scaleX
            };
        }

        // 鼠标控制
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const coords = getCanvasCoordinates(e.clientX, e.clientY);
            paddle.x = coords.x - paddle.width / 2;

            // 限制挡板范围
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > GAME_WIDTH) paddle.x = GAME_WIDTH - paddle.width;
        });

        // 点击发射
        canvas.addEventListener('click', () => {
            launchBall();
        });

        // 触摸控制 - 修复坐标问题
        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            const coords = getCanvasCoordinates(touch.clientX, touch.clientY);
            paddle.x = coords.x - paddle.width / 2;

            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > GAME_WIDTH) paddle.x = GAME_WIDTH - paddle.width;
            
            // 点击发射
            launchBall();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            const coords = getCanvasCoordinates(touch.clientX, touch.clientY);
            paddle.x = coords.x - paddle.width / 2;

            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > GAME_WIDTH) paddle.x = GAME_WIDTH - paddle.width;
        }, { passive: false });

        // 速度控制
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            ballSpeedMultiplier = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = ballSpeedMultiplier.toFixed(1) + 'x';
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const moveDistance = paddle.speed;
            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    paddle.x = Math.max(0, paddle.x - moveDistance);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    paddle.x = Math.min(GAME_WIDTH - paddle.width, paddle.x + moveDistance);
                    break;
                case ' ':
                case 'Enter':
                    e.preventDefault();
                    launchBall();
                    break;
            }
        });

        // 初始化
        initGame();
        draw();
    </script>
</body>
</html>
