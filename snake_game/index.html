<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 贪吃蛇游戏 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 10px;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            background: linear-gradient(45deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            color: #888;
            font-size: 0.75em;
        }

        .info-value {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.1em;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            background: #0a0a0a;
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #1a1a2e;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .btn-pause {
            background: linear-gradient(45deg, #ffaa00, #ff6600);
            color: #1a1a2e;
        }

        .btn-pause:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
        }

        .btn-back {
            background: linear-gradient(45deg, #666, #999);
            color: #fff;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .speed-control label {
            font-size: 0.9em;
            color: #aaa;
        }

        .speed-control input[type="range"] {
            width: 100px;
        }

        .speed-value {
            color: #00ff88;
            font-weight: bold;
            min-width: 40px;
        }

        .mobile-controls {
            display: none;
            margin-top: 15px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 8px;
            justify-content: center;
        }

        .d-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 15px;
            background: rgba(0, 255, 136, 0.3);
            color: #fff;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .d-btn:hover, .d-btn:active {
            background: rgba(0, 255, 136, 0.6);
            transform: scale(0.95);
        }

        .d-btn.up { grid-column: 2; grid-row: 1; }
        .d-btn.left { grid-column: 1; grid-row: 2; }
        .d-btn.right { grid-column: 3; grid-row: 2; }
        .d-btn.down { grid-column: 2; grid-row: 3; }

        .instructions {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.85em;
            color: #aaa;
        }

        .instructions h3 {
            color: #00ff88;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .key {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin: 0 2px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .overlay.active {
            display: flex;
        }

        .overlay h2 {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        .overlay .final-score {
            font-size: 1.3em;
            margin-bottom: 25px;
            color: #00ff88;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.6em; }
            .game-info { gap: 10px; }
            .info-item { padding: 6px 12px; }
            .mobile-controls { display: block; }
            .instructions { display: none; }
            #gameCanvas { max-width: 100%; }
        }

        @media (max-width: 480px) {
            .d-pad {
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(3, 60px);
            }
            .d-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">长度</div>
                <div class="info-value" id="length">3</div>
            </div>
            <div class="info-item">
                <div class="info-label">速度</div>
                <div class="info-value" id="speed">1</div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startGame()">开始游戏</button>
            <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()" style="display: none;">暂停</button>
            <div class="speed-control">
                <label>游戏速度:</label>
                <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
                <span class="speed-value" id="speedValue">1.0x</span>
            </div>
            <a href="../index.html" class="btn btn-back">← 返回</a>
        </div>

        <div class="mobile-controls">
            <div class="d-pad">
                <button class="d-btn up" ontouchstart="setDirection('up')" onmousedown="setDirection('up')">▲</button>
                <button class="d-btn left" ontouchstart="setDirection('left')" onmousedown="setDirection('left')">◀</button>
                <button class="d-btn right" ontouchstart="setDirection('right')" onmousedown="setDirection('right')">▶</button>
                <button class="d-btn down" ontouchstart="setDirection('down')" onmousedown="setDirection('down')">▼</button>
            </div>
        </div>

        <div class="instructions">
            <h3>🎮 操作说明</h3>
            <p>
                使用 <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> 
                或 <span class="key">W</span><span class="key">S</span><span class="key">A</span><span class="key">D</span> 控制方向
            </p>
            <p><span class="key">空格</span> 暂停/继续 | <span class="key">R</span> 重新开始</p>
        </div>
    </div>

    <div class="overlay" id="gameOverOverlay">
        <h2>游戏结束!</h2>
        <div class="final-score">最终得分: <span id="finalScore">0</span></div>
        <button class="btn btn-start" onclick="startGame()">重新开始</button>
        <a href="../index.html" class="btn btn-back" style="margin-top: 15px;">← 返回大厅</a>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GAME_SIZE = 600;
        const GRID_SIZE = 20;
        const GRID_COUNT = GAME_SIZE / GRID_SIZE;

        // 响应式画布尺寸
        function resizeCanvas() {
            const maxSize = Math.min(window.innerWidth - 20, 600);
            canvas.style.width = maxSize + 'px';
            canvas.style.height = maxSize + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameLoop = null;
        let baseSpeed = 150;
        let gameSpeed = 150;
        let isGameRunning = false;
        let isPaused = false;
        let speedMultiplier = 1;

        // 颜色配置
        const COLORS = {
            background: '#0a0a0a',
            grid: '#1a1a1a',
            snakeHead: '#00ff88',
            snakeBody: '#00cc6a',
            snakeOutline: '#00994d',
            food: '#ff4444',
            foodGlow: '#ff6666'
        };

        // 初始化游戏
        function initGame() {
            // 初始化蛇的位置
            const startX = Math.floor(GRID_COUNT / 2);
            const startY = Math.floor(GRID_COUNT / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = baseSpeed / speedMultiplier;
            isPaused = false;
            
            spawnFood();
            updateUI();
        }

        // 生成食物
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * GRID_COUNT),
                    y: Math.floor(Math.random() * GRID_COUNT)
                };
            } while (isSnakeAt(food.x, food.y));
        }

        // 检查蛇是否在指定位置
        function isSnakeAt(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        // 更新游戏状态
        function update() {
            if (isPaused) return;

            direction = nextDirection;

            // 计算新头部位置
            const head = { ...snake[0] };
            
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // 穿墙处理
            if (head.x < 0) head.x = GRID_COUNT - 1;
            if (head.x >= GRID_COUNT) head.x = 0;
            if (head.y < 0) head.y = GRID_COUNT - 1;
            if (head.y >= GRID_COUNT) head.y = 0;

            // 检查撞到自己
            if (isSnakeAt(head.x, head.y)) {
                gameOver();
                return;
            }

            // 移动蛇
            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                // 加快游戏速度
                baseSpeed = Math.max(50, 150 - Math.floor(score / 50) * 10);
                gameSpeed = baseSpeed / speedMultiplier;
                spawnFood();
                updateUI();
                
                // 重新设置游戏循环速度
                clearInterval(gameLoop);
                gameLoop = setInterval(gameStep, gameSpeed);
            } else {
                snake.pop();
            }
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, GAME_SIZE, GAME_SIZE);

            // 绘制网格
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, GAME_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(GAME_SIZE, i * GRID_SIZE);
                ctx.stroke();
            }

            // 绘制食物（带发光效果）
            const foodX = food.x * GRID_SIZE + GRID_SIZE / 2;
            const foodY = food.y * GRID_SIZE + GRID_SIZE / 2;
            
            // 发光效果
            for (let i = 3; i > 0; i--) {
                ctx.beginPath();
                ctx.arc(foodX, foodY, 8 + i * 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 68, 68, ${0.3 - i * 0.1})`;
                ctx.fill();
            }
            
            // 食物本体
            ctx.beginPath();
            ctx.arc(foodX, foodY, 7, 0, Math.PI * 2);
            ctx.fillStyle = COLORS.food;
            ctx.fill();
            
            // 高光
            ctx.beginPath();
            ctx.arc(foodX - 2, foodY - 2, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#ffaaaa';
            ctx.fill();

            // 绘制蛇
            snake.forEach((segment, index) => {
                const x = segment.x * GRID_SIZE;
                const y = segment.y * GRID_SIZE;
                
                // 身体渐变效果
                let color = COLORS.snakeBody;
                if (index === 0) {
                    color = COLORS.snakeHead;
                } else {
                    const gradient = Math.max(0.5, 1 - index * 0.05);
                    const r = Math.floor(0 * gradient);
                    const g = Math.floor(204 * gradient);
                    const b = Math.floor(106 * gradient);
                    color = `rgb(${r}, ${g}, ${b})`;
                }

                // 绘制圆角矩形
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2, 5);
                ctx.fill();

                // 边框
                ctx.strokeStyle = COLORS.snakeOutline;
                ctx.lineWidth = 1;
                ctx.stroke();

                // 绘制眼睛（只在头部）
                if (index === 0) {
                    drawEyes(x, y);
                }
            });
        }

        // 绘制蛇眼睛
        function drawEyes(x, y) {
            const eyeSize = 3;
            const centerX = x + GRID_SIZE / 2;
            const centerY = y + GRID_SIZE / 2;
            let leftEye, rightEye;

            switch (direction) {
                case 'right':
                    leftEye = { x: centerX + 4, y: centerY - 3 };
                    rightEye = { x: centerX + 4, y: centerY + 3 };
                    break;
                case 'left':
                    leftEye = { x: centerX - 4, y: centerY - 3 };
                    rightEye = { x: centerX - 4, y: centerY + 3 };
                    break;
                case 'up':
                    leftEye = { x: centerX - 3, y: centerY - 4 };
                    rightEye = { x: centerX + 3, y: centerY - 4 };
                    break;
                case 'down':
                    leftEye = { x: centerX - 3, y: centerY + 4 };
                    rightEye = { x: centerX + 3, y: centerY + 4 };
                    break;
            }

            // 眼白
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(leftEye.x, leftEye.y, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(rightEye.x, rightEye.y, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            // 瞳孔
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(leftEye.x, leftEye.y, eyeSize / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(rightEye.x, rightEye.y, eyeSize / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // 游戏循环步骤
        function gameStep() {
            update();
            draw();
        }

        // 开始游戏
        function startGame() {
            // 隐藏游戏结束界面
            document.getElementById('gameOverOverlay').classList.remove('active');
            
            // 重置游戏
            initGame();
            
            // 清除旧的游戏循环
            if (gameLoop) clearInterval(gameLoop);
            
            // 开始新的游戏循环
            gameLoop = setInterval(gameStep, gameSpeed);
            isGameRunning = true;
            
            // 更新按钮显示
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').textContent = '暂停';
            
            draw();
        }

        // 暂停/继续
        function togglePause() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
        }

        // 游戏结束
        function gameOver() {
            clearInterval(gameLoop);
            isGameRunning = false;
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('active');
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
            document.getElementById('speed').textContent = Math.floor((150 - baseSpeed) / 10) + 1;
        }

        // 设置方向（防止180度转向）
        function setDirection(newDirection) {
            if (!isGameRunning || isPaused) return;
            
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[newDirection] !== direction) {
                nextDirection = newDirection;
            }
        }

        // 速度控制
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = speedMultiplier.toFixed(1) + 'x';
            if (isGameRunning) {
                gameSpeed = baseSpeed / speedMultiplier;
                clearInterval(gameLoop);
                gameLoop = setInterval(gameStep, gameSpeed);
            }
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) {
                if (e.key === ' ' || e.key === 'Enter') {
                    startGame();
                }
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    setDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    setDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    setDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    setDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
                case 'r':
                case 'R':
                    startGame();
                    break;
            }
        });

        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning || isPaused) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const minSwipeDistance = 30;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (Math.abs(dx) > minSwipeDistance) {
                    setDirection(dx > 0 ? 'right' : 'left');
                }
            } else {
                // 垂直滑动
                if (Math.abs(dy) > minSwipeDistance) {
                    setDirection(dy > 0 ? 'down' : 'up');
                }
            }
        }, { passive: true });

        // 初始化
        initGame();
        draw();
    </script>
</body>
</html>
