<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 飞机大战 - Airplane Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            color: #888;
            font-size: 0.8em;
        }

        .info-value {
            color: #f39c12;
            font-weight: bold;
            font-size: 1.3em;
        }

        #gameCanvas {
            border: 3px solid #f39c12;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
            background: #0a0a0a;
            cursor: crosshair;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            color: #fff;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }

        .btn-back {
            background: linear-gradient(45deg, #666, #999);
            color: #fff;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .instructions {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.9em;
            color: #aaa;
        }

        .instructions h3 {
            color: #f39c12;
            margin-bottom: 10px;
        }

        .key {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin: 0 2px;
            font-family: monospace;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .overlay.active {
            display: flex;
        }

        .overlay h2 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        .overlay .final-score {
            font-size: 1.5em;
            margin-bottom: 30px;
            color: #f39c12;
        }

        @media (max-width: 600px) {
            #gameCanvas {
                width: 100%;
                max-width: 400px;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>✈️ 飞机大战</h1>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">生命</div>
                <div class="info-value" id="lives">3</div>
            </div>
            <div class="info-item">
                <div class="info-label">波次</div>
                <div class="info-value" id="wave">1</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="700"></canvas>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startGame()">开始游戏</button>
            <a href="../index.html" class="btn btn-back">← 返回大厅</a>
        </div>

        <div class="instructions">
            <h3>🎮 操作说明</h3>
            <p>使用鼠标移动飞机，自动射击敌人！</p>
            <p>躲避敌机，击毁敌人获得分数！</p>
        </div>
    </div>

    <div class="overlay" id="gameOverOverlay">
        <h2>💥 游戏结束</h2>
        <div class="final-score">最终得分: <span id="finalScore">0</span></div>
        <button class="btn btn-start" onclick="startGame()">重新开始</button>
        <a href="../index.html" class="btn btn-back" style="margin-top: 15px;">← 返回大厅</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let wave = 1;
        let animationId = null;

        // 游戏对象
        let player, bullets, enemies, particles, stars;

        // 粒子类
        class Particle {
            constructor(x, y, color, speed = 1) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4 * speed;
                this.vy = (Math.random() - 0.5) * 4 * speed;
                this.radius = Math.random() * 3 + 2;
                this.color = color;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 星星背景
        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 1.5;
                this.speed = Math.random() * 2 + 0.5;
                this.brightness = Math.random();
            }

            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = 0;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 初始化游戏
        function initGame() {
            // 玩家飞机
            player = {
                x: canvas.width / 2,
                y: canvas.height - 80,
                width: 40,
                height: 50,
                speed: 5
            };

            // 初始化数组
            bullets = [];
            enemies = [];
            particles = [];
            stars = Array(100).fill(null).map(() => new Star());

            // 重置状态
            score = 0;
            lives = 3;
            wave = 1;
            updateUI();

            // 隐藏覆盖层
            document.getElementById('gameOverOverlay').classList.remove('active');
        }

        // 创建敌人
        function spawnEnemy() {
            const types = [
                { width: 30, height: 30, speed: 2, hp: 1, score: 10, color: '#e74c3c' },
                { width: 40, height: 40, speed: 1.5, hp: 2, score: 20, color: '#9b59b6' },
                { width: 50, height: 50, speed: 1, hp: 3, score: 30, color: '#f39c12' }
            ];
            
            const type = types[Math.min(Math.floor(Math.random() * wave / 3), 2)];
            
            enemies.push({
                x: Math.random() * (canvas.width - type.width),
                y: -type.height,
                ...type,
                currentHp: type.hp
            });
        }

        // 创建爆炸粒子
        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, 2));
            }
        }

        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            gameLoop();
            
            document.getElementById('startBtn').style.display = 'none';
        }

        // 游戏循环
        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();

            animationId = requestAnimationFrame(gameLoop);
        }

        // 更新游戏状态
        function update() {
            // 更新星星
            stars.forEach(star => star.update());

            // 玩家自动射击
            if (Math.random() < 0.05) {
                bullets.push({
                    x: player.x,
                    y: player.y - 20,
                    width: 4,
                    height: 15,
                    speed: 10,
                    color: '#00ff88'
                });
            }

            // 更新子弹
            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed;
                return bullet.y > -bullet.height;
            });

            // 生成敌人
            if (Math.random() < 0.02 + wave * 0.005) {
                spawnEnemy();
            }

            // 更新敌人
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;

                // 检查与玩家碰撞
                if (checkCollision(enemy, player)) {
                    lives--;
                    createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
                    updateUI();
                    if (lives <= 0) {
                        gameOver();
                    }
                    return false;
                }

                // 检查是否飞出屏幕
                if (enemy.y > canvas.height) {
                    return false;
                }

                return true;
            });

            // 子弹与敌人碰撞检测
            bullets.forEach((bullet, bIndex) => {
                enemies.forEach((enemy, eIndex) => {
                    if (checkCollision(bullet, enemy)) {
                        enemy.currentHp--;
                        bullets.splice(bIndex, 1);
                        
                        if (enemy.currentHp <= 0) {
                            score += enemy.score;
                            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
                            enemies.splice(eIndex, 1);
                            
                            // 升级波次
                            if (score > wave * 200) {
                                wave++;
                            }
                            
                            updateUI();
                        }
                    }
                });
            });

            // 更新粒子
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        // 碰撞检测
        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + (a.width || 4) > b.x &&
                   a.y < b.y + b.height &&
                   a.y + (a.height || 15) > b.y;
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星星
            stars.forEach(star => star.draw());

            // 绘制玩家飞机
            drawPlayer();

            // 绘制子弹
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.shadowColor = bullet.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                ctx.shadowBlur = 0;
            });

            // 绘制敌人
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.shadowColor = enemy.color;
                ctx.shadowBlur = 10;
                
                // 绘制敌机形状
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                ctx.lineTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.width, enemy.y);
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0;

                // 绘制血条
                if (enemy.hp > 1) {
                    const barWidth = enemy.width;
                    const barHeight = 4;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(enemy.x, enemy.y - 10, barWidth, barHeight);
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(enemy.x, enemy.y - 10, barWidth * (enemy.currentHp / enemy.hp), barHeight);
                }
            });

            // 绘制粒子
            particles.forEach(p => p.draw());
        }

        // 绘制玩家飞机
        function drawPlayer() {
            const x = player.x;
            const y = player.y;
            const w = player.width;
            const h = player.height;

            ctx.fillStyle = '#3498db';
            ctx.shadowColor = '#3498db';
            ctx.shadowBlur = 15;

            // 机身
            ctx.beginPath();
            ctx.moveTo(x, y - h / 2);
            ctx.lineTo(x - w / 2, y + h / 2);
            ctx.lineTo(x, y + h / 3);
            ctx.lineTo(x + w / 2, y + h / 2);
            ctx.closePath();
            ctx.fill();

            // 机翼
            ctx.fillStyle = '#2980b9';
            ctx.beginPath();
            ctx.moveTo(x - w, y + h / 4);
            ctx.lineTo(x - w / 2, y + h / 4);
            ctx.lineTo(x - w / 2, y + h / 2);
            ctx.lineTo(x - w, y + h / 3);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(x + w, y + h / 4);
            ctx.lineTo(x + w / 2, y + h / 4);
            ctx.lineTo(x + w / 2, y + h / 2);
            ctx.lineTo(x + w, y + h / 3);
            ctx.closePath();
            ctx.fill();

            // 引擎火焰
            ctx.fillStyle = '#e74c3c';
            ctx.shadowColor = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(x - 5, y + h / 3);
            ctx.lineTo(x, y + h / 2 + Math.random() * 15 + 10);
            ctx.lineTo(x + 5, y + h / 3);
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('wave').textContent = wave;
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('active');
            document.getElementById('startBtn').style.display = 'inline-block';
        }

        // 鼠标控制
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
            
            // 限制玩家范围
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > canvas.width - player.width / 2) player.x = canvas.width - player.width / 2;
        });

        // 触摸控制
        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            player.x = e.touches[0].clientX - rect.left;
            
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > canvas.width - player.width / 2) player.x = canvas.width - player.width / 2;
        });

        // 初始化
        initGame();
        draw();
    </script>
</body>
</html>
