<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ 飞机大战 - Airplane Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 10px;
        }

        .game-container {
            touch-action: pan-y;
        }

        #gameCanvas, .d-btn {
            touch-action: none;
        }

        .game-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            color: #888;
            font-size: 0.75em;
        }

        .info-value {
            color: #f39c12;
            font-weight: bold;
            font-size: 1.1em;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        #gameCanvas {
            border: 3px solid #f39c12;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
            background: #0a0a0a;
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            color: #fff;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }

        .btn-back {
            background: linear-gradient(45deg, #666, #999);
            color: #fff;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .speed-control label {
            font-size: 0.9em;
            color: #aaa;
        }

        .speed-control input[type="range"] {
            width: 100px;
        }

        .speed-value {
            color: #f39c12;
            font-weight: bold;
            min-width: 40px;
        }

        .mobile-controls {
            display: none;
            margin-top: 15px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 8px;
            justify-content: center;
        }

        .d-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 15px;
            background: rgba(243, 156, 18, 0.3);
            color: #fff;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .d-btn:hover, .d-btn:active {
            background: rgba(243, 156, 18, 0.6);
            transform: scale(0.95);
        }

        .d-btn.up { grid-column: 2; grid-row: 1; }
        .d-btn.left { grid-column: 1; grid-row: 2; }
        .d-btn.right { grid-column: 3; grid-row: 2; }
        .d-btn.down { grid-column: 2; grid-row: 3; }
        .d-btn.center { grid-column: 2; grid-row: 2; background: rgba(231, 76, 60, 0.4); font-size: 1.2em; }

        .instructions {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.85em;
            color: #aaa;
        }

        .instructions h3 {
            color: #f39c12;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .key {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin: 0 2px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .overlay.active {
            display: flex;
        }

        .overlay h2 {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        .overlay .final-score {
            font-size: 1.3em;
            margin-bottom: 25px;
            color: #f39c12;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.6em; }
            .game-info { gap: 10px; }
            .info-item { padding: 6px 12px; }
            .mobile-controls { display: block; }
            .instructions { display: none; }
            #gameCanvas { max-width: 100%; }
        }

        @media (max-width: 480px) {
            .d-pad {
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(3, 60px);
            }
            .d-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>✈️ 飞机大战</h1>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">生命</div>
                <div class="info-value" id="lives">3</div>
            </div>
            <div class="info-item">
                <div class="info-label">波次</div>
                <div class="info-value" id="wave">1</div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="700"></canvas>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startGame()">开始游戏</button>
            <div class="speed-control">
                <label>游戏速度:</label>
                <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
                <span class="speed-value" id="speedValue">1.0x</span>
            </div>
            <a href="../index.html" class="btn btn-back">← 返回</a>
        </div>

        <div class="mobile-controls">
            <div class="d-pad">
                <button class="d-btn up" ontouchstart="startMoving('up')" ontouchend="stopMoving()" onmousedown="startMoving('up')" onmouseup="stopMoving()" onmouseleave="stopMoving()">▲</button>
                <button class="d-btn left" ontouchstart="startMoving('left')" ontouchend="stopMoving()" onmousedown="startMoving('left')" onmouseup="stopMoving()" onmouseleave="stopMoving()">◀</button>
                <button class="d-btn center" ontouchstart="playerShoot()" onmousedown="playerShoot()">🔥</button>
                <button class="d-btn right" ontouchstart="startMoving('right')" ontouchend="stopMoving()" onmousedown="startMoving('right')" onmouseup="stopMoving()" onmouseleave="stopMoving()">▶</button>
                <button class="d-btn down" ontouchstart="startMoving('down')" ontouchend="stopMoving()" onmousedown="startMoving('down')" onmouseup="stopMoving()" onmouseleave="stopMoving()">▼</button>
            </div>
        </div>

        <div class="instructions">
            <h3>🎮 操作说明</h3>
            <p>使用 <span class="key">方向键</span> 或 <span class="key">WASD</span> 移动飞机</p>
            <p>自动射击敌人，躲避敌机，击毁敌人获得分数！</p>
        </div>
    </div>

    <div class="overlay" id="gameOverOverlay">
        <h2>💥 游戏结束</h2>
        <div class="final-score">最终得分: <span id="finalScore">0</span></div>
        <button class="btn btn-start" onclick="startGame()">重新开始</button>
        <a href="../index.html" class="btn btn-back" style="margin-top: 15px;">← 返回大厅</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const GAME_WIDTH = 600;
        const GAME_HEIGHT = 700;
        
        // 响应式画布尺寸
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 600);
            const scale = maxWidth / GAME_WIDTH;
            canvas.style.width = maxWidth + 'px';
            canvas.style.height = (GAME_HEIGHT * scale) + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let wave = 1;
        let animationId = null;
        let gameSpeed = 1;

        // 游戏对象
        let player, bullets, enemies, particles, stars;

        // 粒子类
        class Particle {
            constructor(x, y, color, speed = 1) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4 * speed;
                this.vy = (Math.random() - 0.5) * 4 * speed;
                this.radius = Math.random() * 3 + 2;
                this.color = color;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 星星背景
        class Star {
            constructor() {
                this.x = Math.random() * GAME_WIDTH;
                this.y = Math.random() * GAME_HEIGHT;
                this.radius = Math.random() * 1.5;
                this.speed = Math.random() * 2 + 0.5;
                this.brightness = Math.random();
            }

            update() {
                this.y += this.speed * gameSpeed;
                if (this.y > GAME_HEIGHT) {
                    this.y = 0;
                    this.x = Math.random() * GAME_WIDTH;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 初始化游戏
        function initGame() {
            // 玩家飞机 - 放大尺寸
            player = {
                x: GAME_WIDTH / 2,
                y: GAME_HEIGHT - 100,
                width: 60,
                height: 75,
                speed: 6
            };

            // 初始化数组
            bullets = [];
            enemies = [];
            particles = [];
            stars = Array(100).fill(null).map(() => new Star());

            // 重置状态
            score = 0;
            lives = 3;
            wave = 1;
            updateUI();

            // 隐藏覆盖层
            document.getElementById('gameOverOverlay').classList.remove('active');
        }

        // 创建敌人
        function spawnEnemy() {
            const types = [
                { width: 40, height: 40, speed: 2, hp: 1, score: 10, color: '#e74c3c' },
                { width: 50, height: 50, speed: 1.5, hp: 2, score: 20, color: '#9b59b6' },
                { width: 60, height: 60, speed: 1, hp: 3, score: 30, color: '#f39c12' }
            ];
            
            const type = types[Math.min(Math.floor(Math.random() * wave / 3), 2)];
            
            enemies.push({
                x: Math.random() * (GAME_WIDTH - type.width),
                y: -type.height,
                ...type,
                currentHp: type.hp
            });
        }

        // 创建爆炸粒子
        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, 2));
            }
        }

        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            gameLoop();
            
            document.getElementById('startBtn').style.display = 'none';
        }

        // 游戏循环
        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();

            animationId = requestAnimationFrame(gameLoop);
        }

        // 更新游戏状态
        function update() {
            // 更新星星
            stars.forEach(star => star.update());

            // 玩家自动射击
            if (Math.random() < 0.05 * gameSpeed) {
                bullets.push({
                    x: player.x,
                    y: player.y - 30,
                    width: 6,
                    height: 20,
                    speed: 10,
                    color: '#00ff88'
                });
            }

            // 更新子弹
            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed * gameSpeed;
                return bullet.y > -bullet.height;
            });

            // 生成敌人
            if (Math.random() < (0.02 + wave * 0.005) * gameSpeed) {
                spawnEnemy();
            }

            // 更新敌人
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed * gameSpeed;

                // 检查与玩家碰撞
                if (checkCollision(enemy, player)) {
                    lives--;
                    createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
                    updateUI();
                    if (lives <= 0) {
                        gameOver();
                    }
                    return false;
                }

                // 检查是否飞出屏幕
                if (enemy.y > GAME_HEIGHT) {
                    return false;
                }

                return true;
            });

            // 子弹与敌人碰撞检测
            for (let bIndex = bullets.length - 1; bIndex >= 0; bIndex--) {
                const bullet = bullets[bIndex];
                for (let eIndex = enemies.length - 1; eIndex >= 0; eIndex--) {
                    const enemy = enemies[eIndex];
                    if (checkCollision(bullet, enemy)) {
                        enemy.currentHp--;
                        bullets.splice(bIndex, 1);
                        
                        if (enemy.currentHp <= 0) {
                            score += enemy.score;
                            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
                            enemies.splice(eIndex, 1);
                            
                            // 升级波次
                            if (score > wave * 200) {
                                wave++;
                            }
                            
                            updateUI();
                        }
                        break;
                    }
                }
            }

            // 更新粒子
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        // 碰撞检测
        function checkCollision(a, b) {
            const aWidth = a.width || 4;
            const aHeight = a.height || 15;
            return a.x < b.x + b.width / 2 + aWidth / 2 &&
                   a.x > b.x - b.width / 2 - aWidth / 2 &&
                   a.y < b.y + b.height / 2 + aHeight / 2 &&
                   a.y > b.y - b.height / 2 - aHeight / 2;
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // 绘制星星
            stars.forEach(star => star.draw());

            // 绘制玩家飞机
            drawPlayer();

            // 绘制子弹
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.shadowColor = bullet.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                ctx.shadowBlur = 0;
            });

            // 绘制敌人
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.shadowColor = enemy.color;
                ctx.shadowBlur = 10;
                
                // 绘制敌机形状
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                ctx.lineTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.width, enemy.y);
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0;

                // 绘制血条
                if (enemy.hp > 1) {
                    const barWidth = enemy.width;
                    const barHeight = 4;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(enemy.x, enemy.y - 10, barWidth, barHeight);
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(enemy.x, enemy.y - 10, barWidth * (enemy.currentHp / enemy.hp), barHeight);
                }
            });

            // 绘制粒子
            particles.forEach(p => p.draw());
        }

        // 绘制玩家飞机 - 放大版
        function drawPlayer() {
            const x = player.x;
            const y = player.y;
            const w = player.width;
            const h = player.height;

            ctx.fillStyle = '#3498db';
            ctx.shadowColor = '#3498db';
            ctx.shadowBlur = 15;

            // 机身
            ctx.beginPath();
            ctx.moveTo(x, y - h / 2);
            ctx.lineTo(x - w / 2, y + h / 2);
            ctx.lineTo(x, y + h / 3);
            ctx.lineTo(x + w / 2, y + h / 2);
            ctx.closePath();
            ctx.fill();

            // 机翼
            ctx.fillStyle = '#2980b9';
            ctx.beginPath();
            ctx.moveTo(x - w, y + h / 4);
            ctx.lineTo(x - w / 2, y + h / 4);
            ctx.lineTo(x - w / 2, y + h / 2);
            ctx.lineTo(x - w, y + h / 3);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(x + w, y + h / 4);
            ctx.lineTo(x + w / 2, y + h / 4);
            ctx.lineTo(x + w / 2, y + h / 2);
            ctx.lineTo(x + w, y + h / 3);
            ctx.closePath();
            ctx.fill();

            // 引擎火焰
            ctx.fillStyle = '#e74c3c';
            ctx.shadowColor = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(x - 8, y + h / 3);
            ctx.lineTo(x, y + h / 2 + Math.random() * 20 + 15);
            ctx.lineTo(x + 8, y + h / 3);
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('wave').textContent = wave;
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('active');
            document.getElementById('startBtn').style.display = 'inline-block';
        }

        // 移动玩家（虚拟按键）
        let moveInterval = null;
        
        function startMoving(direction) {
            if (moveInterval) return;
            movePlayer(direction);
            moveInterval = setInterval(() => movePlayer(direction), 50);
        }
        
        function stopMoving() {
            if (moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
        }
        
        function movePlayer(direction) {
            if (!gameRunning) return;
            const moveDistance = player.speed * 2;
            switch(direction) {
                case 'up':
                    player.y = Math.max(player.height / 2, player.y - moveDistance);
                    break;
                case 'down':
                    player.y = Math.min(GAME_HEIGHT - player.height / 2, player.y + moveDistance);
                    break;
                case 'left':
                    player.x = Math.max(player.width / 2, player.x - moveDistance);
                    break;
                case 'right':
                    player.x = Math.min(GAME_WIDTH - player.width / 2, player.x + moveDistance);
                    break;
            }
        }

        // 玩家射击
        function playerShoot() {
            if (!gameRunning) return;
            bullets.push({
                x: player.x,
                y: player.y - 30,
                width: 6,
                height: 20,
                speed: 12,
                color: '#00ff88'
            });
        }

        // 获取鼠标/触摸在画布上的正确坐标
        function getCanvasCoordinates(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            const scaleY = GAME_HEIGHT / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // 鼠标控制
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const coords = getCanvasCoordinates(e.clientX, e.clientY);
            player.x = coords.x;
            player.y = coords.y;
            
            // 限制玩家范围
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > GAME_WIDTH - player.width / 2) player.x = GAME_WIDTH - player.width / 2;
            if (player.y < player.height / 2) player.y = player.height / 2;
            if (player.y > GAME_HEIGHT - player.height / 2) player.y = GAME_HEIGHT - player.height / 2;
        });

        // 触摸控制 - 修复坐标问题
        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            const coords = getCanvasCoordinates(touch.clientX, touch.clientY);
            player.x = coords.x;
            player.y = coords.y;
            
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > GAME_WIDTH - player.width / 2) player.x = GAME_WIDTH - player.width / 2;
            if (player.y < player.height / 2) player.y = player.height / 2;
            if (player.y > GAME_HEIGHT - player.height / 2) player.y = GAME_HEIGHT - player.height / 2;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            const coords = getCanvasCoordinates(touch.clientX, touch.clientY);
            player.x = coords.x;
            player.y = coords.y;
            
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > GAME_WIDTH - player.width / 2) player.x = GAME_WIDTH - player.width / 2;
            if (player.y < player.height / 2) player.y = player.height / 2;
            if (player.y > GAME_HEIGHT - player.height / 2) player.y = GAME_HEIGHT - player.height / 2;
        }, { passive: false });

        // 速度控制
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            gameSpeed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = gameSpeed.toFixed(1) + 'x';
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const moveDistance = player.speed * 2;
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    player.y = Math.max(player.height / 2, player.y - moveDistance);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    player.y = Math.min(GAME_HEIGHT - player.height / 2, player.y + moveDistance);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    player.x = Math.max(player.width / 2, player.x - moveDistance);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    player.x = Math.min(GAME_WIDTH - player.width / 2, player.x + moveDistance);
                    break;
                case ' ':
                    e.preventDefault();
                    playerShoot();
                    break;
            }
        });

        // 初始化
        initGame();
        draw();
    </script>
</body>
</html>
